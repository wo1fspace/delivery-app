<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達管理アプリ</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:       #0f1117;
    --bg2:      #181c27;
    --bg3:      #1f2336;
    --border:   #2a2f45;
    --text:     #e8eaf0;
    --text2:    #8b92a8;
    --accent:   #4f8ef7;
    --accent2:  #34c983;
    --warn:     #f5a623;
    --danger:   #e05252;
    --gray-row: #2a2f45;
    --radius:   10px;
    --font:     'Noto Sans JP', sans-serif;
    --mono:     'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ログイン画面 */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 48px 56px; text-align: center; max-width: 420px; width: 90%;
  }
  .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-box p  { color: var(--text2); font-size: 13px; margin-bottom: 32px; line-height: 1.7; }
  .btn-ms {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 14px 28px; font-size: 14px; font-family: var(--font); font-weight: 500;
    cursor: pointer; width: 100%; transition: opacity .2s;
  }
  .btn-ms:hover { opacity: .85; }

  /* メイン画面 */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ヘッダー */
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .user-badge { font-size: 12px; color: var(--text2); }
  .btn-sm {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text); font-size: 12px; cursor: pointer;
    font-family: var(--font); transition: background .15s;
  }
  .btn-sm:hover { background: var(--bg3); }

  /* タブ */
  .tabs {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; padding: 0 24px; gap: 4px;
  }
  .tab {
    padding: 14px 18px; font-size: 13px; color: var(--text2); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: var(--font);
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* コンテンツ */
  .content { padding: 24px; flex: 1; overflow: auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* サマリーカード */
  .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 24px; }
  .summary-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; display: flex; flex-direction: column; gap: 8px;
  }
  .summary-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; }
  .summary-card .value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .summary-card .value.blue   { color: var(--accent);  }
  .summary-card .value.green  { color: var(--accent2); }
  .summary-card .value.orange { color: var(--warn);    }

  /* カード */
  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 20px; overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 14px; font-weight: 500; }

  /* テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 500;
    color: var(--text2); text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    background: var(--bg3);
  }
  td {
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    vertical-align: middle; white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr.done td { color: var(--text2); background: var(--gray-row); text-decoration: line-through; text-decoration-color: #444; }
  tr:hover:not(.done) td { background: var(--bg3); }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-done    { background: rgba(52,201,131,.15); color: var(--accent2); }
  .badge-pending { background: rgba(245,166,35,.15);  color: var(--warn);    }
  .badge-active  { background: rgba(79,142,247,.15);  color: var(--accent);  }

  .amount-a { color: var(--accent);  font-family: var(--mono); font-weight: 500; }
  .amount-b { color: var(--accent2); font-family: var(--mono); }
  .amount-s { color: var(--warn);    font-family: var(--mono); font-size: 12px; }

  /* フォーム */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  .form-group input, .form-group select {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg3); color: var(--text); font-size: 13px; font-family: var(--font);
    outline: none; transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg3); }

  .calc-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 0 20px 20px; }
  .calc-box { border-radius: 8px; padding: 14px 16px; }
  .calc-box.a { background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.25); }
  .calc-box.b { background: rgba(52,201,131,.1); border: 1px solid rgba(52,201,131,.25); }
  .calc-box.s { background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.25); }
  .calc-box .clabel { font-size: 11px; margin-bottom: 6px; }
  .calc-box.a .clabel { color: var(--accent);  }
  .calc-box.b .clabel { color: var(--accent2); }
  .calc-box.s .clabel { color: var(--warn);    }
  .calc-box .camount { font-size: 22px; font-weight: 700; font-family: var(--mono); }
  .calc-box.a .camount { color: var(--accent);  }
  .calc-box.b .camount { color: var(--accent2); }
  .calc-box.s .camount { color: var(--warn);    }
  .calc-box .cdetail  { font-size: 11px; color: var(--text2); margin-top: 4px; }

  .form-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .btn-primary {
    padding: 9px 22px; border-radius: 7px; border: none;
    background: var(--accent); color: #fff; font-size: 13px; font-family: var(--font);
    font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-cancel {
    padding: 9px 22px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 13px; font-family: var(--font);
    cursor: pointer;
  }

  /* 単価テーブル */
  .price-table { padding: 20px; }
  .price-table table { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .price-table th, .price-table td { text-align: center; }
  .price-table td:first-child { text-align: left; font-weight: 500; }
  .price-table .col-a { color: var(--accent);  font-family: var(--mono); }
  .price-table .col-b { color: var(--accent2); font-family: var(--mono); }

  /* 月次集計 */
  .monthly-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
  .month-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px;
  }
  .month-card .month-name { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
  .month-stat { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .month-stat:last-child { border-bottom: none; }
  .month-stat .ms-label { color: var(--text2); }
  .month-stat .ms-val   { font-family: var(--mono); font-weight: 500; }

  /* フィルター */
  .filter-row { display: flex; gap: 10px; align-items: center; }
  .filter-row select {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg3); color: var(--text); font-size: 13px; font-family: var(--font);
  }

  /* ローディング */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .spinner {
    display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* トースト */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 20px; font-size: 13px; max-width: 320px;
    transform: translateY(80px); opacity: 0; transition: all .3s;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error   { border-color: var(--danger);  color: var(--danger);  }

  .month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .month-tab-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer;
    font-family: var(--font); transition: all .15s;
  }
  .month-tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:16px;">🚚</div>
    <h1>配達管理アプリ</h1>
    <p>Microsoftアカウントでログインして<br>OneDriveのExcelデータと連携します</p>
    <button class="btn-ms" onclick="login()">
      <svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Microsoftアカウントでログイン
    </button>
  </div>
  <p style="font-size:12px;color:#444;text-align:center;">このアプリはOneDrive上のExcelファイルにのみアクセスします</p>
</div>

<!-- メイン画面 -->
<div id="app">
  <header>
    <div class="logo">配達<span>管理</span></div>
    <div class="header-right">
      <span class="user-badge" id="user-name"></span>
      <button class="btn-sm" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard',this)">ダッシュボード</button>
    <button class="tab" onclick="showTab('list',this)">配達一覧</button>
    <button class="tab" onclick="showTab('add',this)">新規登録</button>
    <button class="tab" onclick="showTab('price',this)">単価設定</button>
    <button class="tab" onclick="showTab('monthly',this)">月次集計</button>
  </div>

  <div class="content">

    <!-- ダッシュボード -->
    <div id="tab-dashboard" class="section active">
      <div class="summary-grid">
        <div class="summary-card"><div class="label">本日の件数</div><div class="value blue" id="s-today">—</div></div>
        <div class="summary-card"><div class="label">完了</div><div class="value green" id="s-done">—</div></div>
        <div class="summary-card"><div class="label">未完了・配達中</div><div class="value orange" id="s-pending">—</div></div>
        <div class="summary-card"><div class="label">今月 A社料金合計</div><div class="value blue" id="s-total" style="font-size:18px;">—</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">直近の配達</span>
          <button class="btn-sm" onclick="loadData()">更新</button>
        </div>
        <div class="table-wrap" id="dashboard-table">
          <div class="loading"><div class="spinner"></div><br>データを読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- 配達一覧 -->
    <div id="tab-list" class="section">
      <div class="month-tabs" id="month-tabs"></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="list-title">配達一覧</span>
          <div class="filter-row">
            <select id="filter-status" onchange="renderList()">
              <option value="">すべての状況</option>
              <option value="完了">完了</option>
              <option value="未完了">未完了</option>
              <option value="配達中">配達中</option>
            </select>
            <select id="filter-company" onchange="renderList()">
              <option value="">すべての会社</option>
              <option>タンスのゲン</option>
              <option>日本の匠</option>
              <option>関家具</option>
            </select>
          </div>
        </div>
        <div class="table-wrap" id="list-table">
          <div class="loading"><div class="spinner"></div><br>データを読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- 新規登録 -->
    <div id="tab-add" class="section">
      <div class="card">
        <div class="card-header"><span class="card-title">配達案件を新規登録</span></div>
        <div class="form-grid">
          <div class="form-group">
            <label>問い合わせNo / 注文番号</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <input type="text" id="f-trk" placeholder="TRK-001">
              <input type="text" id="f-ord" placeholder="ORD-101">
            </div>
          </div>
          <div class="form-group">
            <label>郵便番号 / 住所</label>
            <div style="display:grid;grid-template-columns:120px 1fr;gap:8px;">
              <input type="text" id="f-zip" placeholder="000-0000">
              <input type="text" id="f-addr" placeholder="福岡市xx-xx">
            </div>
          </div>
          <div class="form-group"><label>配送予定日</label><input type="date" id="f-date"></div>
          <div class="form-group"><label>氏名</label><input type="text" id="f-name" placeholder="山田　太郎"></div>
          <div class="form-group">
            <label>会社</label>
            <select id="f-company" onchange="calcPrice()">
              <option value="">選択してください</option>
              <option>タンスのゲン</option><option>日本の匠</option><option>関家具</option>
            </select>
          </div>
          <div class="form-group">
            <label>配達種類</label>
            <select id="f-method" onchange="calcPrice()">
              <option value="">選択してください</option>
              <option>軒先</option><option>開梱設置</option>
            </select>
          </div>
          <div class="form-group"><label>個数</label><input type="number" id="f-kosu" min="1" value="1" oninput="calcPrice()"></div>
          <div class="form-group"><label>才数</label><input type="number" id="f-saisuu" min="1" oninput="calcPrice()"></div>
          <div class="form-group"><label>担当者</label><input type="text" id="f-tanto" placeholder="佐藤"></div>
          <div class="form-group">
            <label>配達完了</label>
            <select id="f-status">
              <option>未完了</option><option>配達中</option><option>完了</option>
            </select>
          </div>
          <div class="form-group"><label>送り状記事欄1</label><input type="text" id="f-s1"></div>
          <div class="form-group"><label>送り状記事欄2</label><input type="text" id="f-s2"></div>
          <div class="form-group"><label>組立て・作業項目</label><input type="text" id="f-kumitate"></div>
          <div class="form-group"><label>手数料（任意）</label><input type="number" id="f-tesuuryo" placeholder="0"></div>
        </div>
        <div class="calc-row">
          <div class="calc-box a">
            <div class="clabel">A社料金</div>
            <div class="camount" id="calc-a">— 円</div>
            <div class="cdetail" id="calc-a-detail"></div>
          </div>
          <div class="calc-box b">
            <div class="clabel">B社料金</div>
            <div class="camount" id="calc-b">— 円</div>
            <div class="cdetail" id="calc-b-detail"></div>
          </div>
          <div class="calc-box s">
            <div class="clabel">下払い料金（任意）</div>
            <input type="number" id="f-shim" placeholder="0"
              style="background:transparent;border:none;border-bottom:1px solid rgba(245,166,35,.4);color:var(--warn);font-size:18px;font-family:var(--mono);font-weight:700;width:100%;outline:none;padding:0;"
              oninput="updateShimDisplay()">
            <div class="cdetail" id="calc-s-detail">入力すると表示されます</div>
          </div>
        </div>
        <div class="form-footer">
          <button class="btn-cancel" onclick="clearForm()">クリア</button>
          <button class="btn-primary" onclick="submitForm()">Excelに登録する</button>
        </div>
      </div>
    </div>

    <!-- 単価設定 -->
    <div id="tab-price" class="section">
      <div class="card">
        <div class="card-header">
          <span class="card-title">単価テーブル（才あたり）</span>
          <span style="font-size:12px;color:var(--text2);">変更はExcelの単価テーブルシートで行ってください</span>
        </div>
        <div class="price-table">
          <table>
            <thead><tr><th>会社名</th><th>配達種類</th><th>A社単価</th><th>B社単価</th></tr></thead>
            <tbody id="price-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 月次集計 -->
    <div id="tab-monthly" class="section">
      <div class="monthly-grid" id="monthly-grid">
        <div class="loading"><div class="spinner"></div><br>集計中...</div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ===== MSAL設定 =====
const CLIENT_ID  = "59852915-7fd3-4ea7-8830-895a382ed718";
const TENANT_ID  = "e67306e0-ab7a-411d-a518-cb80c33a2994";
const FILE_NAME  = "配達管理v4.xlsx"; // OneDrive上のファイル名

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: "https://wo1fspace.github.io/delivery-app/",
  },
  cache: { cacheLocation: "sessionStorage" }
};

let msalInstance = null;
const scopes = ["Files.ReadWrite", "User.Read"];

let accessToken = null;
let fileId      = null;
let allData     = [];
let currentMonth = null;

const PRICES = {
  "タンスのゲン軒先":    { a: 250, b: 240 },
  "タンスのゲン開梱設置":{ a: 290, b: 270 },
  "日本の匠軒先":        { a: 200, b: 190 },
  "日本の匠開梱設置":    { a: 290, b: 270 },
  "関家具軒先":          { a: 200, b: 190 },
  "関家具開梱設置":      { a: 290, b: 270 },
};

// ===== 認証 =====
async function login() {
  try {
    if (!msalInstance) {
      msalInstance = new msal.PublicClientApplication(msalConfig);
      await msalInstance.initialize();
    }
    const resp = await msalInstance.loginPopup({ scopes });
    accessToken = resp.accessToken;
    document.getElementById("user-name").textContent = resp.account.name || resp.account.username;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    await findFile();
    await loadData();
    renderPriceTable();
  } catch(e) {
    showToast("ログインに失敗しました: " + e.message, "error");
  }
}

function logout() {
  msalInstance.logoutPopup();
  location.reload();
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return null;
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes, account: accounts[0] });
    return resp.accessToken;
  } catch {
    const resp = await msalInstance.acquireTokenPopup({ scopes });
    return resp.accessToken;
  }
}

// ===== ファイル検索 =====
async function findFile() {
  const token = await getToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root/children?$filter=name eq '${FILE_NAME}'`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();
  if (data.value && data.value.length > 0) {
    fileId = data.value[0].id;
    showToast("Excelファイルに接続しました", "success");
  } else {
    showToast(`OneDriveに「${FILE_NAME}」が見つかりません。ファイルを確認してください。`, "error");
  }
}

// ===== データ読み込み =====
async function loadData() {
  if (!fileId) return;
  const token = await getToken();
  allData = [];

  // 月シートのリストを取得
  const sheetsRes = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  const sheetsData = await sheetsRes.json();
  const monthSheets = (sheetsData.value || []).filter(s => s.name.match(/^\d{4}年\d+月$/));

  if (!currentMonth && monthSheets.length > 0) {
    currentMonth = monthSheets[monthSheets.length - 1].name;
  }

  // 月タブを生成
  renderMonthTabs(monthSheets.map(s => s.name));

  // 現在の月のデータを読み込む
  if (currentMonth) {
    await loadMonthData(currentMonth);
  }

  updateDashboard();
  renderList();
  renderMonthly(monthSheets.map(s => s.name));
}

async function loadMonthData(sheetName) {
  const token = await getToken();
  try {
    const res = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(sheetName)}')/usedRange`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();
    const rows = data.values || [];
    allData = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0] && !r[4]) continue;
      allData.push({
        row:      i + 1,
        date:     r[0]  || "",
        trk:      r[1]  || "",
        ord:      r[2]  || "",
        status:   r[3]  || "",
        company:  r[4]  || "",
        method:   r[5]  || "",
        zip:      r[6]  || "",
        addr:     r[7]  || "",
        name:     r[8]  || "",
        kosu:     r[9]  || "",
        saisuu:   r[10] || "",
        amtA:     r[11] || "",
        amtB:     r[12] || "",
        shim:     r[13] || "",
        tanto:    r[14] || "",
        s1:       r[15] || "",
        s2:       r[16] || "",
        kumitate: r[17] || "",
        tesuuryo: r[18] || "",
        sheet:    sheetName,
      });
    }
  } catch(e) {
    console.error(e);
  }
}

// ===== 月タブ =====
function renderMonthTabs(months) {
  const el = document.getElementById("month-tabs");
  el.innerHTML = months.map(m =>
    `<button class="month-tab-btn ${m === currentMonth ? 'active' : ''}" onclick="switchMonth('${m}',this)">${m}</button>`
  ).join("");
}

async function switchMonth(month, btn) {
  currentMonth = month;
  document.querySelectorAll(".month-tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("list-title").textContent = month + " の配達一覧";
  document.getElementById("list-table").innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  await loadMonthData(month);
  renderList();
  updateDashboard();
}

// ===== ダッシュボード =====
function updateDashboard() {
  const today = new Date().toLocaleDateString("ja-JP", {year:"numeric",month:"numeric",day:"numeric"});
  const todayData = allData.filter(d => {
    const dDate = new Date(d.date);
    return dDate.toLocaleDateString("ja-JP", {year:"numeric",month:"numeric",day:"numeric"}) === today;
  });
  document.getElementById("s-today").textContent   = allData.length;
  document.getElementById("s-done").textContent    = allData.filter(d => d.status === "完了").length;
  document.getElementById("s-pending").textContent = allData.filter(d => d.status !== "完了").length;

  const totalA = allData.reduce((s,d) => s + (parseFloat(d.amtA) || 0), 0);
  document.getElementById("s-total").textContent = totalA ? "¥" + Math.round(totalA).toLocaleString() : "—";

  // テーブル
  const recent = [...allData].slice(-10).reverse();
  const tbody = recent.map(d => rowHTML(d)).join("");
  document.getElementById("dashboard-table").innerHTML = recent.length
    ? `<table><thead><tr><th>問い合わせNo</th><th>配達先</th><th>会社</th><th>方法</th><th>才数</th><th>A社料金</th><th>B社料金</th><th>下払い</th><th>担当者</th><th>状況</th></tr></thead><tbody>${tbody}</tbody></table>`
    : '<div class="loading">データがありません</div>';
}

function rowHTML(d) {
  const cls = d.status === "完了" ? " class=\"done\"" : "";
  const badge = d.status === "完了" ? "badge-done" : d.status === "配達中" ? "badge-active" : "badge-pending";
  const amtA = d.amtA ? "¥" + Math.round(d.amtA).toLocaleString() : "—";
  const amtB = d.amtB ? "¥" + Math.round(d.amtB).toLocaleString() : "—";
  const shim = d.shim ? "¥" + Math.round(d.shim).toLocaleString() : "—";
  return `<tr${cls}>
    <td><span style="font-family:var(--mono);font-size:12px">${d.trk}</span><br><span style="font-size:11px;color:var(--text2)">${d.ord}</span></td>
    <td><span style="font-size:11px;color:var(--text2)">${d.zip}</span><br>${d.addr}</td>
    <td>${d.company}</td><td>${d.method}</td>
    <td style="text-align:center;font-family:var(--mono)">${d.saisuu}</td>
    <td class="amount-a">${amtA}</td>
    <td class="amount-b">${amtB}</td>
    <td class="amount-s">${shim}</td>
    <td>${d.tanto}</td>
    <td><span class="badge ${badge}">${d.status}</span></td>
  </tr>`;
}

// ===== 配達一覧 =====
function renderList() {
  const status  = document.getElementById("filter-status").value;
  const company = document.getElementById("filter-company").value;
  let rows = allData.filter(d =>
    (!status  || d.status  === status) &&
    (!company || d.company === company)
  );
  const tbody = rows.map(d => rowHTML(d)).join("");
  document.getElementById("list-table").innerHTML = rows.length
    ? `<table><thead><tr><th>問い合わせNo</th><th>配達先</th><th>会社</th><th>方法</th><th>才数</th><th>A社料金</th><th>B社料金</th><th>下払い</th><th>担当者</th><th>状況</th></tr></thead><tbody>${tbody}</tbody></table>`
    : '<div class="loading">該当するデータがありません</div>';
}

// ===== 料金計算 =====
function calcPrice() {
  const company = document.getElementById("f-company").value;
  const method  = document.getElementById("f-method").value;
  const saisuu  = parseFloat(document.getElementById("f-saisuu").value) || 0;
  const key     = company + method;
  const p       = PRICES[key];

  if (p && saisuu) {
    const a = p.a * saisuu; const b = p.b * saisuu;
    document.getElementById("calc-a").textContent       = "¥" + Math.round(a).toLocaleString();
    document.getElementById("calc-b").textContent       = "¥" + Math.round(b).toLocaleString();
    document.getElementById("calc-a-detail").textContent = `¥${p.a}/才 × ${saisuu}才`;
    document.getElementById("calc-b-detail").textContent = `¥${p.b}/才 × ${saisuu}才`;
  } else {
    document.getElementById("calc-a").textContent = "— 円";
    document.getElementById("calc-b").textContent = "— 円";
    document.getElementById("calc-a-detail").textContent = "";
    document.getElementById("calc-b-detail").textContent = "";
  }
}

function updateShimDisplay() {
  const v = parseFloat(document.getElementById("f-shim").value) || 0;
  document.getElementById("calc-s-detail").textContent = v ? "別途管理" : "入力すると表示されます";
}

// ===== フォーム送信 =====
async function submitForm() {
  if (!fileId) { showToast("Excelファイルに接続されていません", "error"); return; }
  const company = document.getElementById("f-company").value;
  const method  = document.getElementById("f-method").value;
  const saisuu  = parseFloat(document.getElementById("f-saisuu").value) || 0;
  const key     = company + method;
  const p       = PRICES[key];
  const amtA    = p && saisuu ? p.a * saisuu : null;
  const amtB    = p && saisuu ? p.b * saisuu : null;
  const shim    = parseFloat(document.getElementById("f-shim").value) || null;
  const tesuuryo = parseFloat(document.getElementById("f-tesuuryo").value) || null;

  // 書き込む行を探す（空の行）
  const nextRow = allData.length + 2; // ヘッダー1行 + データ行数 + 1

  const token = await getToken();
  const sheetName = currentMonth || "2026年3月";

  const values = [[
    document.getElementById("f-date").value,
    document.getElementById("f-trk").value,
    document.getElementById("f-ord").value,
    document.getElementById("f-status").value,
    company,
    method,
    document.getElementById("f-zip").value,
    document.getElementById("f-addr").value,
    document.getElementById("f-name").value,
    parseFloat(document.getElementById("f-kosu").value) || null,
    saisuu || null,
    amtA,
    amtB,
    shim,
    document.getElementById("f-tanto").value,
    document.getElementById("f-s1").value,
    document.getElementById("f-s2").value,
    document.getElementById("f-kumitate").value,
    tesuuryo,
  ]];

  try {
    const res = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(sheetName)}')/range(address='A${nextRow}:S${nextRow}')`,
      {
        method: "PATCH",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ values })
      }
    );
    if (res.ok) {
      showToast("Excelに登録しました！", "success");
      clearForm();
      await loadMonthData(sheetName);
      updateDashboard();
      renderList();
    } else {
      const err = await res.json();
      showToast("登録に失敗しました: " + (err.error?.message || "不明なエラー"), "error");
    }
  } catch(e) {
    showToast("通信エラー: " + e.message, "error");
  }
}

function clearForm() {
  ["f-trk","f-ord","f-zip","f-addr","f-date","f-name","f-kosu","f-saisuu",
   "f-tanto","f-s1","f-s2","f-kumitate","f-tesuuryo","f-shim"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("f-company").value = "";
  document.getElementById("f-method").value  = "";
  document.getElementById("f-status").value  = "未完了";
  calcPrice();
}

// ===== 単価テーブル =====
function renderPriceTable() {
  const rows = [
    ["タンスのゲン","軒先",    250,240],
    ["タンスのゲン","開梱設置",290,270],
    ["日本の匠",   "軒先",    200,190],
    ["日本の匠",   "開梱設置",290,270],
    ["関家具",     "軒先",    200,190],
    ["関家具",     "開梱設置",290,270],
  ];
  document.getElementById("price-body").innerHTML = rows.map(r =>
    `<tr>
      <td>${r[0]}</td><td>${r[1]}</td>
      <td class="col-a">¥${r[2].toLocaleString()}/才</td>
      <td class="col-b">¥${r[3].toLocaleString()}/才</td>
    </tr>`
  ).join("");
}

// ===== 月次集計 =====
async function renderMonthly(monthNames) {
  const token = await getToken();
  const grid  = document.getElementById("monthly-grid");
  grid.innerHTML = "";

  for (const name of monthNames) {
    try {
      const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(name)}')/usedRange`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const data = await res.json();
      const rows = (data.values || []).slice(1).filter(r => r[0] || r[4]);
      const cnt   = rows.length;
      const done  = rows.filter(r => r[3] === "完了").length;
      const totalA = rows.reduce((s,r) => s + (parseFloat(r[11]) || 0), 0);
      const totalB = rows.reduce((s,r) => s + (parseFloat(r[12]) || 0), 0);
      const totalS = rows.reduce((s,r) => s + (parseFloat(r[13]) || 0), 0);

      const card = document.createElement("div");
      card.className = "month-card";
      card.innerHTML = `
        <div class="month-name">${name}</div>
        <div class="month-stat"><span class="ms-label">配達件数</span><span class="ms-val">${cnt} 件</span></div>
        <div class="month-stat"><span class="ms-label">完了</span><span class="ms-val" style="color:var(--accent2)">${done} 件</span></div>
        <div class="month-stat"><span class="ms-label">A社料金合計</span><span class="ms-val" style="color:var(--accent)">¥${Math.round(totalA).toLocaleString()}</span></div>
        <div class="month-stat"><span class="ms-label">B社料金合計</span><span class="ms-val" style="color:var(--accent2)">¥${Math.round(totalB).toLocaleString()}</span></div>
        <div class="month-stat"><span class="ms-label">下払い合計</span><span class="ms-val" style="color:var(--warn)">¥${Math.round(totalS).toLocaleString()}</span></div>
      `;
      grid.appendChild(card);
    } catch(e) { console.error(name, e); }
  }
}

// ===== タブ切り替え =====
function showTab(id, btn) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + id).classList.add("active");
  btn.classList.add("active");
}

// ===== トースト =====
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  setTimeout(() => t.className = "", 3500);
}

// 初期化（ページ読み込み時に実行）
async function initApp() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();

  // すでにログイン済みの場合は自動でアプリを表示
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    document.getElementById("user-name").textContent = accounts[0].name || accounts[0].username;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    const t = await getToken();
    accessToken = t;
    await findFile();
    await loadData();
    renderPriceTable();
  }
}

window.addEventListener("load", initApp);
</script>
